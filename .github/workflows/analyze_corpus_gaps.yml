name: Analyze Corpus Gaps

on:
  schedule:
    # Ogni notte alle 02:00 UTC (04:00 ora italiana)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Numero CSV da analizzare (default 2000)'
        required: false
        default: '2000'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 ore max — sufficiente per 2000 CSV

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install chardet pandas requests

      - name: Run gap analysis
        run: |
          python scripts/analyze_corpus_gaps.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corpus/
          git diff --staged --quiet || git commit -m "analysis: gap analysis corpus $(date +%Y%m%d)"
          git push
